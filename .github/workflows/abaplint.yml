name: abaplint

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  abaplint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Run abaplint
        run: npx --yes @abaplint/cli@latest
